<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mongolia - Cesium Globe</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
    #cesiumContainer { width: 100%; height: 100%; }
    #info {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 10;
    }
    #info h1 { font-size: 1.3rem; margin-bottom: 4px; }
    #info p  { font-size: 0.85rem; color: #ccc; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="info">
    <h1>🇲🇳 モンゴル</h1>
    <p>Mongolia — Central Asia</p>
  </div>

  <script>
    const clock = new Cesium.Clock({
      startTime: Cesium.JulianDate.fromIso8601("2000-01-01"),
      stopTime: Cesium.JulianDate.fromIso8601("2020-12-31"),
      currentTime: Cesium.JulianDate.fromIso8601("2000-01-01"),
      clockRange: Cesium.ClockRange.LOOP_STOP,
      clockStep: Cesium.ClockStep.TICK_DEPENDENT,
      multiplier: 60 * 60 * 24 * 10,
      shouldAnimate: true,
    });

    const viewer = new Cesium.Viewer("cesiumContainer", {
      terrainProvider: new Cesium.EllipsoidTerrainProvider(),
      clockViewModel: new Cesium.ClockViewModel(clock),
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: true,
      navigationHelpButton: false,
      automaticallyTrackDataSourceClocks: false,
      fullscreenButton: true,
      baseLayer: false,
    });

    viewer.imageryLayers.addImageryProvider(
      new Cesium.UrlTemplateImageryProvider({
        url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        credit: "© OpenStreetMap contributors",
        maximumLevel: 19,
      })
    );

    const pinBuilder = new Cesium.PinBuilder();
    const dataSourcePromise = Cesium.KmlDataSource.load("files/clock-sample.kml");
    dataSourcePromise.then((dataSource) => {
      viewer.dataSources.add(dataSource);
      dataSource.entities.values.forEach((entity) => {
        entity.billboard = new Cesium.BillboardGraphics({
          image:pinBuilder.fromColor(Cesium.Color.ROYALBLUE, 48).toDataURL(),
          scale: 0.5,
        });
        if (entity.label) {
          entity.label.scale = 0.9;
          entity.label.distanceDisplayCondition = new Cesium.DistanceDisplayCondition(0, 250000);
        }
      });
    }).catch(console.error);

    // モンゴル国境ポリゴン
    viewer.dataSources.add(
      Cesium.GeoJsonDataSource.load("files/mongolia-border.geojson",{
        stroke: Cesium.Color.PALETURQUOISE ,
        fill: Cesium.Color.PALETURQUOISE .withAlpha(0.5),
        strokeWidth: 3,
      },),
    );

    // カメラをモンゴル中心に設定（初期位置を即時セット → flyTo）
    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(103.85, 46.86, 3800000),
      orientation: {
        heading: Cesium.Math.toRadians(0),
        pitch:   Cesium.Math.toRadians(-90),
        roll: 0,
      },
    });
  </script>
</body>
</html>
